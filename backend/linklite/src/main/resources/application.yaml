spring:
  application:
    name: linklite
  profiles:
    active: dev
  
  datasource:
    url: jdbc:postgresql://localhost:5432/linklite_db
    username: postgres
    password: 231429
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      
---
spring:
  config:
    activate:
      on-profile: test
      
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        
  h2:
    console:
      enabled: true
      
---
spring:
  config:
    activate:
      on-profile: dev
      
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
      
server:
  port: 8081
  servlet:
    context-path: /api/v1
    
logging:
  level:
    com.hcl.linklite: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized